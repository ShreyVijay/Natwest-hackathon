services:
  - type: web
    name: Bolt-engine
    runtime: python
    rootDir: execution_engine
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: Bolt-frontend
          property: url

  - type: web
    name: Bolt-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: EXECUTION_ENGINE_URL
        fromService:
          type: web
          name: Bolt-engine
          property: url
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: Bolt-frontend
          property: url
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: Bolt-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_CHAT_API_URL
        fromService:
          type: web
          name: Bolt-backend
          property: url
      - key: VITE_GROQ_API_KEY
        sync: false

